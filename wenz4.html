<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthdayy, Mikaela!!</title>

<link rel="stylesheet" href="wenz4.css">
</head>

<body>
<div class="fx-layer"></div>
<div class="phone-frame">

    <h2 class="title">Happyy Birthdayy, My Dearestt🤍</h2>

    <!-- 🌸 BOUQUET -->
    <div id="surpriseSection" class="card fade-in">
        <p class="subtitle">here's something more for u 🤍</p>

        <button class="reveal-btn" onclick="showBouquet()">
            reveal bouquet 🤍
        </button>

        <div id="bouquetBox">
            <img src="bouquet.jpg" class="surprise-img">
        </div>

        <p id="typeMessage" class="typewriter"></p>

        <button class="next-btn hidden" id="nextAfterReveal" onclick="goToPlan()">
            next 🤍
        </button>
    </div>

    <!-- 🗓 PLAN -->
    <div id="planSection" class="card hidden fade-in">
        <label>what time ka free? mwheheh</label>
        <input type="time" id="timeInput">

        <label>where ikaw free?</label>
        <input type="text" id="placeInput" placeholder="lagay mo dito hehe">

        <button class="confirm-btn" onclick="submitPlan()">
            confirm hehe
        </button>

        <p id="resultMsg" class="result-msg"></p>

        <button class="next-btn" onclick="goNextPage()">
            last page 🤍
        </button>
    </div>

</div>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" autoplay loop>
    <source src="dear.mp3" type="audio/mpeg">
</audio>

<div id="sparkles"></div>

<script>

/* 🌸 REVEAL + TYPEWRITER */
function showBouquet() {
    const box = document.getElementById("bouquetBox");
    const messageEl = document.getElementById("typeMessage");
    const nextBtn = document.getElementById("nextAfterReveal");

    box.classList.add("show");

    const text = "Remember when I asked you to give me 3 flowers na nagagandahan ka? I've maked a digital version of it nung sinend mo na gerberas and rose, and added tulips and gumamela as well I hope you love it, Mikaela😉 Happy Birthdayyy🤍";
    let i = 0;

    messageEl.innerHTML = "";

    setTimeout(() => {
        function typeWriter() {
            if (i < text.length) {
                messageEl.innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 35);
            } else {
                nextBtn.classList.remove("hidden");
            }
        }
        typeWriter();
    }, 500);
}

/* 👉 NEXT STEP */
function goToPlan() {
    const surprise = document.getElementById("surpriseSection");
    const plan = document.getElementById("planSection");

    surprise.classList.add("fade-out");

    setTimeout(() => {
        surprise.classList.add("hidden");
        plan.classList.remove("hidden");
    }, 500);
}

/* 👉 LAST PAGE */
function goNextPage() {
    window.location.href = "wenz5.html";
}

/* PLAN */
function submitPlan() {
    const time = document.getElementById("timeInput").value;
    const place = document.getElementById("placeInput").value;

    if (!time || !place) {
        document.getElementById("resultMsg").innerText =
            "uy fill mo muna 😠";
        return;
    }

    document.getElementById("resultMsg").innerText =
        "noted hehe, see you " + time + " sa " + place + " 🤍";
}

/* 🎵 AUTOPLAY FIX */
window.addEventListener("load", () => {
    const music = document.getElementById("bgMusic");

    const playPromise = music.play();

    if (playPromise !== undefined) {
        playPromise.catch(() => {
            document.body.addEventListener("click", () => {
                music.play();
            }, { once: true });
        });
    }
});

/* ✨ SPARKLES */
function createSparkle() {
    const sparkle = document.createElement("div");
    sparkle.classList.add("sparkle");

    sparkle.style.left = Math.random() * window.innerWidth + "px";
    sparkle.style.top = Math.random() * window.innerHeight + "px";

   document.querySelector(".fx-layer").appendChild(sparkle);

    setTimeout(() => sparkle.remove(), 2000);
}
setInterval(createSparkle, 700);
/* ✨ FLOATING BUBBLES */
function createGlow() {
    const glow = document.createElement("div");
    glow.classList.add("glow");

    glow.style.left = Math.random() * window.innerWidth + "px";
    glow.style.top = window.innerHeight + "px"; // start from bottom

    document.querySelector(".fx-layer").appendChild(glow);
    setTimeout(() => {
        glow.remove();
    }, 8000);
}

setInterval(createGlow, 400);
</script>


</div>
</body>
</html>
